<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Familia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<a href="/{{ slug }}/" class="btn btn-outline-secondary mb-3">
    ← Volver al panel
</a>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h4>Familia: {{ familia.nombre }}</h4>
        <a href="/{{ slug }}/familias/{{ familia.id }}/editar/" 
           class="btn btn-secondary">
            Editar
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <h6>Socios asociados</h6>

            {% if socios %}
                <ul class="list-group">
                    {% for socio in socios %}
                        <li class="list-group-item">
                            {{ socio.nombre }} {{ socio.apellidos }}
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No hay socios en esta familia.</p>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
