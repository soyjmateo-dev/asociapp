<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Cuota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CALENDARIO -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
        {% if cuota %}
        Editar cuota
        {% else %}
        Nueva cuota
        {% endif %}
        </h2>

        <a href="/{{ slug }}/cuotas/" class="btn btn-outline-secondary">
            ← Volver
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        {{ form.nombre }}
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Año</label>
                        {{ form.año }}
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Tipo</label>
                        {{ form.tipo }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Importe adulto (€)</label>
                        {{ form.importe_adulto }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Importe menor (€)</label>
                        {{ form.importe_menor }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Fecha vencimiento</label>

                        <input type="text"
                               name="fecha_vencimiento"
                               id="id_fecha_vencimiento"
                               value="{{ form.fecha_vencimiento.value|default:'' }}"
                               class="form-control datepicker">

                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        Guardar cuota
                    </button>
                </div>

            </form>

            {% if form.errors %}
            <div class="alert alert-danger mt-3">
                {{ form.errors }}
            </div>
            {% endif %}

        </div>
    </div>

</div>


<!-- JS CALENDARIO -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    flatpickr(".datepicker", {
        dateFormat: "Y-m-d",
        locale: "es"
    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
