<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>{% block title %}Panel{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* FONDO GENERAL */

body{
    background:#f0f7f0;
}


/* SIDEBAR */

.sidebar{
width:240px;
background:white;
border-right:1px solid #e6e6e6;
height:100vh;
position:fixed;
left:0;
top:0;
padding:20px;
}

.sidebar h5{
font-weight:600;
margin-bottom:25px;
}

/* LINKS MENU */

.sidebar a{
display:block;
padding:9px 12px;
border-radius:8px;
text-decoration:none;
color:#444;
margin-bottom:6px;
transition:all 0.15s ease;
}

.sidebar a:hover{
background:#e8f5e9;
color:#1b5e20;
}

.sidebar i{
margin-right:8px;
}


/* MENU ACTIVO */

.sidebar a.active{
background:#e8f5e9;
color:#1b5e20;
font-weight:600;
}

.sidebar a.active i{
color:#1b5e20;
}


/* CONTENT */

.main{
margin-left:240px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}


/* TARJETAS (cards) */

.card{
border:none;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}


/* TABLAS */

table{
border-radius:10px;
overflow:hidden;
}


/* BOTONES */

.btn-success{
background:#2e7d32;
border-color:#2e7d32;
}

.btn-success:hover{
background:#256628;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h5>
<i class="bi bi-building"></i>
{{ request.organizacion.nombre }}
</h5>

<a href="/{{ request.organizacion.slug }}/"
class="{% if request.path == '/'|add:request.organizacion.slug|add:'/' %}active{% endif %}">
<i class="bi bi-speedometer2"></i>
Panel
</a>

<a href="/{{ request.organizacion.slug }}/socios/"
class="{% if '/socios/' in request.path %}active{% endif %}">
<i class="bi bi-people"></i>
Socios
</a>

<a href="/{{ request.organizacion.slug }}/familias/"
class="{% if '/familias/' in request.path %}active{% endif %}">
<i class="bi bi-house"></i>
Familias
</a>

<a href="/{{ request.organizacion.slug }}/cuotas/"
class="{% if '/cuotas/' in request.path %}active{% endif %}">
<i class="bi bi-receipt"></i>
Cuotas
</a>

<a href="/{{ request.organizacion.slug }}/actividades/"
class="{% if '/actividades/' in request.path %}active{% endif %}">
<i class="bi bi-calendar-event"></i>
Actividades
</a>

<a href="/{{ request.organizacion.slug }}/pagos/"
class="{% if '/pagos/' in request.path %}active{% endif %}">
<i class="bi bi-credit-card"></i>
Pagos
</a>

<a href="/{{ request.organizacion.slug }}/gastos/"
class="{% if '/gastos/' in request.path %}active{% endif %}">
<i class="bi bi-cash"></i>
Gastos
</a>

<a href="/{{ request.organizacion.slug }}/patrocinadores/"
class="{% if '/patrocinadores/' in request.path %}active{% endif %}">
<i class="bi bi-megaphone"></i>
Patrocinadores
</a>

<a href="/{{ request.organizacion.slug }}/inventario/"
class="{% if '/inventario/' in request.path %}active{% endif %}">
<i class="bi bi-box"></i>
Inventario
</a>

<a href="/{{ request.organizacion.slug }}/contactos/"
class="{% if '/contactos/' in request.path %}active{% endif %}">
<i class="bi bi-person-lines-fill"></i>
Contactos
</a>

<a href="/{{ request.organizacion.slug }}/comunicaciones/"
class="{% if '/comunicaciones/' in request.path %}active{% endif %}">
<i class="bi bi-envelope"></i>
Comunicaciones
</a>

<hr>

<a href="/{{ request.organizacion.slug }}/password-change/">
<i class="bi bi-key"></i>
Contraseña
</a>

<a href="/{{ request.organizacion.slug }}/logout/">
<i class="bi bi-box-arrow-right"></i>
Salir
</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div>
</div>

<div>
👤 {{ request.user.username }}
</div>

</div>

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
