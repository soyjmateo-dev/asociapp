<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <h4 class="text-danger mb-3">⚠ Eliminar socio</h4>

                    <p>
                        Estás a punto de eliminar al socio:
                    </p>

                    <div class="alert alert-warning text-center fw-bold">
                        {{ socio.nombre }} {{ socio.apellidos }}
                    </div>

                    <p class="small text-muted">
                        Para confirmar, escribe exactamente el nombre completo del socio.
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <input type="text"
                                   id="confirmacion"
                                   name="confirmacion"
                                   class="form-control"
                                   placeholder="Escribe el nombre completo"
                                   autocomplete="off">
                        </div>

                        <button id="btnEliminar"
                                type="submit"
                                class="btn btn-danger w-100"
                                disabled>
                            Confirmar eliminación
                        </button>
                    </form>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/{{ slug }}/socios/" class="text-muted">
                    ← Cancelar
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    const input = document.getElementById("confirmacion");
    const button = document.getElementById("btnEliminar");
    const nombreReal = "{{ socio.nombre }} {{ socio.apellidos }}".toLowerCase();

    input.addEventListener("input", function() {
        if (input.value.trim().toLowerCase() === nombreReal) {
            button.disabled = false;
        } else {
            button.disabled = true;
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>


</body>
</html>
