<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva actividad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CALENDARIO -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- CABECERA -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Nueva actividad</h2>

        <a href="/{{ slug }}/actividades/" class="btn btn-outline-secondary">
            ← Volver
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="row g-4">

                    <!-- Nombre -->
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        {{ form.nombre }}
                    </div>

                    <!-- Fecha -->
                    <div class="col-md-6">
                        <label class="form-label">Fecha</label>

                        <input type="text"
                               name="fecha"
                               id="id_fecha"
                               value="{{ form.fecha.value|default:'' }}"
                               class="form-control datepicker">

                    </div>

                    <!-- Descripción -->
                    <div class="col-12">
                        <label class="form-label">Descripción</label>
                        {{ form.descripcion }}
                    </div>

                    <!-- Cupo -->
                    <div class="col-md-4">
                        <label class="form-label">Plazas máximas</label>
                        {{ form.cupo_maximo }}
                    </div>

                    <!-- Precio adulto -->
                    <div class="col-md-4">
                        <label class="form-label">Precio adulto</label>
                        {{ form.coste_adulto }}
                    </div>

                    <!-- Precio menor -->
                    <div class="col-md-4">
                        <label class="form-label">Precio menor</label>
                        {{ form.coste_menor }}
                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        Guardar actividad
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<!-- JS CALENDARIO -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    flatpickr(".datepicker", {
        dateFormat: "Y-m-d",
        locale: "es"
    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
