<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="mb-0">{{ titulo }}</h2>

    <div class="d-flex gap-2">

        <a href="/{{ slug }}/" class="btn btn-outline-secondary">
            ← Volver al Panel
        </a>

        {% if boton_extra %}
        <a href="{{ boton_extra }}" class="btn btn-outline-danger">
            📄 Socios con deuda
        </a>
        {% endif %}

        {% if boton_exportar %}
        <a href="{{ boton_exportar }}" class="btn btn-success">
            Exportar Excel
        </a>
        {% endif %}

        {% if boton_importar %}
        <a href="{{ boton_importar }}" class="btn btn-outline-primary">
            Importar
        </a>
        {% endif %}

        {% if boton_nuevo %}
        <a href="{{ boton_nuevo }}" class="btn btn-primary">
            + Nuevo
        </a>
        {% endif %}

    </div>

</div>
